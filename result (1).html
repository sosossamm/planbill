<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>적정 금액 결과 — 인테리어플랜Bill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0F0E0C; --ink3:#4A4743; --muted:#8A8780;
  --rule:#E8E5E0; --paper:#F8F6F2; --surface:#FFFFFF;
  --accent:#1F4FD8;
  --exp:#9A1F1F; --exp-bg:#FCEAEA;
  --cheap:#1A6B3E; --cheap-bg:#EBF7F0;
  --rc:14px; --rs:8px; --mw:820px; --pad:1.5rem;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',sans-serif;color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased;}

/* NAV */
#gnb{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--rule);}
.nav-in{max-width:var(--mw);margin:0 auto;padding:0 var(--pad);height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo-sm{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-icon-sm{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-icon-sm svg{width:15px;height:15px;}
.logo-name{font-size:.88rem;font-weight:800;color:var(--ink);letter-spacing:-.01em;}
.logo-name span{color:var(--accent);}
.nav-back{display:inline-flex;align-items:center;gap:5px;font-size:.82rem;font-weight:600;color:var(--ink3);text-decoration:none;transition:color .15s;}
.nav-back:hover{color:var(--accent);}
.nav-recalc{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;font-weight:700;color:var(--accent);background:#f0f4ff;border:1.5px solid #c9d3f0;border-radius:var(--rs);padding:7px 13px;text-decoration:none;transition:all .15s;white-space:nowrap;}
.nav-recalc:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

/* HERO */
#rhero{background:var(--ink);color:#fff;padding:44px var(--pad) 36px;position:relative;overflow:hidden;}
#rhero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 70% at 85% 50%,rgba(31,79,216,.25) 0%,transparent 65%);pointer-events:none;}
.rh-in{position:relative;max-width:var(--mw);margin:0 auto;}
.rh-ey{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px;}
.rh-tt{font-size:clamp(1.1rem,3.5vw,1.55rem);font-weight:800;letter-spacing:-.025em;line-height:1.3;margin-bottom:8px;word-break:keep-all;}
.rh-tt .hl{color:#7fa8ff;}
.rh-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;}
.rh-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:4px 11px;font-size:.73rem;font-weight:600;color:rgba(255,255,255,.65);}

/* MAIN */
.main-wrap{max-width:var(--mw);margin:0 auto;padding:28px var(--pad) 64px;}

/* 전체 수준 카드 */
.level-card{background:var(--surface);border:1.5px solid var(--rule);border-radius:var(--rc);padding:24px;margin-bottom:16px;}
.level-title{font-size:.78rem;font-weight:700;color:var(--ink3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:16px;}
.level-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border-radius:var(--rs);overflow:hidden;margin-bottom:16px;}
.lcol{padding:16px 10px;text-align:center;background:var(--surface);}
.lcol.active{background:#f0f4ff;}
.lcol-label{font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.lcol-label.s{color:var(--muted);}
.lcol-label.m{color:var(--accent);}
.lcol-label.p{color:#0a2fa8;}
.lcol-price{font-size:clamp(1rem,2.5vw,1.3rem);font-weight:800;letter-spacing:-.02em;margin-bottom:3px;}
.lcol-price.s{color:var(--ink3);}
.lcol-price.m{color:var(--accent);}
.lcol-price.p{color:#0a2fa8;}
.lcol-unit{font-size:.7rem;color:var(--muted);}
.lcol-unit.m{color:var(--accent);opacity:.7;}

/* 내 예산 게이지 */
.my-budget-row{display:none;}
.my-budget-row.show{display:block;}
.gauge-track{height:8px;background:var(--rule);border-radius:999px;overflow:visible;margin-bottom:8px;position:relative;}
.gauge-fill{height:100%;border-radius:999px;background:var(--accent);transition:width .8s cubic-bezier(.4,0,.2,1);}
.gauge-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;background:var(--accent);border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(31,79,216,.4);transition:left .8s cubic-bezier(.4,0,.2,1);}
.my-budget-note{font-size:.82rem;font-weight:700;color:var(--accent);}

/* 섹션 구분선 */
.sec-div{display:flex;align-items:center;gap:12px;margin:24px 0 14px;}
.sdline{flex:1;height:1px;background:var(--rule);}
.sdtext{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}

/* 공종 테이블 */
.item-table{display:flex;flex-direction:column;gap:3px;}
.it-head{display:grid;grid-template-columns:1fr 80px 80px 80px;gap:0;padding:0 14px 8px;font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.it-head .mh{color:var(--accent);}
.irow{display:grid;grid-template-columns:1fr 80px 80px 80px;align-items:center;padding:10px 14px;background:var(--surface);border-radius:var(--rs);border:1.5px solid var(--rule);transition:border-color .2s;}
.irow:hover{border-color:#c9d3f0;}
.irow.hl{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,79,216,.08);}
.irow-name{display:flex;align-items:center;gap:8px;}
.irow-icon{font-size:.9rem;width:18px;text-align:center;}
.irow-info{}
.irow-tt{font-size:.88rem;font-weight:700;color:var(--ink);}
.irow-badge{font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:999px;margin-left:4px;}
.irow-badge.pri{background:#e8edfc;color:var(--accent);}
.irow-badge.rec{background:var(--cheap-bg);color:var(--cheap);}
.irow-sub{font-size:.72rem;color:var(--muted);}
.irow-cell{text-align:center;font-size:.82rem;}
.irow-cell.sv{color:var(--ink3);}
.irow-cell.mv{font-size:.9rem;font-weight:700;color:var(--accent);background:#f0f4ff;border-radius:5px;padding:4px 2px;margin:0 2px;}
.irow-cell.pv{color:var(--ink3);}

/* 전문가 조언 */
.tip-box{background:linear-gradient(135deg,#f0f4ff 0%,#e8edfc 100%);border:2px solid #b8c9ff;border-radius:var(--rc);padding:20px 22px;margin-bottom:16px;}
.tip-box-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.tip-badge{background:var(--accent);color:#fff;font-size:.72rem;font-weight:700;padding:4px 11px;border-radius:999px;}
.tip-box-tt{font-size:.95rem;font-weight:800;color:var(--ink);}
.tip-list{display:flex;flex-direction:column;gap:10px;}
.tip-item{background:#fff;border:1.5px solid #c9d3f0;border-radius:var(--rs);padding:13px 16px;display:flex;gap:12px;align-items:flex-start;}
.tip-ic{font-size:.95rem;flex-shrink:0;margin-top:1px;}
.tip-tt2{font-size:.85rem;font-weight:700;color:var(--ink);margin-bottom:3px;word-break:keep-all;}
.tip-sb2{font-size:.8rem;color:var(--ink3);line-height:1.65;word-break:keep-all;}

/* 하단 버튼 */
.bot-btns{margin-top:32px;display:flex;flex-direction:column;gap:10px;}
.btn-recalc{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;text-decoration:none;transition:background .2s,transform .15s,box-shadow .2s;letter-spacing:-.01em;}
.btn-recalc:hover{background:#1a44c4;transform:translateY(-2px);box-shadow:0 8px 24px rgba(31,79,216,.35);}
.btn-quote{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--surface);color:var(--ink);border:1.5px solid var(--rule);border-radius:var(--rs);font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:-.01em;}
.btn-quote:hover{border-color:var(--accent);color:var(--accent);background:#f0f4ff;}

footer{background:var(--ink);padding:20px var(--pad);text-align:center;font-size:.72rem;color:rgba(255,255,255,.22);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fa{animation:fadeUp .5s ease both;}

@media(max-width:560px){
  .it-head,.irow{grid-template-columns:1fr 70px 70px 70px;}
  .level-cols{grid-template-columns:repeat(3,1fr);}
  .lcol-price{font-size:.95rem;}
}
@media(max-width:400px){
  .it-head,.irow{grid-template-columns:1fr 60px 60px 60px;}
  .irow-cell{font-size:.75rem;}
  .irow-cell.mv{font-size:.8rem;}
}
</style>
</head>

  ],
  premium: [
    {icon:'🌳',tt:'원목마루 방향이 중요',sb:'원목마루는 직사광선에 지속 노출되면 뒤틀릴 수 있어요. 창 방향과 마루 결 방향을 맞추면 수축·팽창으로 인한 변형을 줄일 수 있습니다.'},
    {icon:'✨',tt:'마감재보다 시공 품질이 먼저',sb:'고급 자재도 시공이 나쁘면 의미가 없어요. 시공 업체의 포트폴리오와 하자 보증 기간을 반드시 확인하세요.'},
  ],
};

// 공종 단가 기준 (기타 지역 기준, 만원)
const ITEMS = [
  {key:'철거',            icon:'🔨', s:[15,17], m:[20,22], p:[24,26], unit:'평', calc:'pyeong'},
  {key:'욕실',            icon:'🚿', s:[250,300],m:[400,500],p:[650,850], unit:'개', calc:'bath'},
  {key:'싱크대',          icon:'🍳', s:[40,55], m:[65,80], p:[95,120], unit:'m', calc:'sink'},
  {key:'바닥재',          icon:'🪵', s:[2.5,3.5],m:[5,7],  p:[9,13],  unit:'㎡', calc:'sqm'},
  {key:'도배',            icon:'🖌️', s:[2,2.5], m:[3.5,4.5],p:[5,7],  unit:'평', calc:'pyeong'},
  {key:'목공/몰딩',       icon:'🪚', s:[5,7],   m:[7,9],   p:[9,12],  unit:'평', calc:'pyeong'},
  {key:'전기배선',        icon:'⚡', s:[10,13], m:[14,18], p:[18,22], unit:'평', calc:'pyeong'},
  {key:'발코니샷시',      icon:'🪟', s:[150,200],m:[200,280],p:[300,420],unit:'식',calc:'fixed'},
  {key:'현관문',          icon:'🚪', s:[80,100], m:[110,150],p:[160,220],unit:'개',calc:'fixed1'},
  {key:'방수(욕실)',      icon:'💧', s:[10,13], m:[13,17], p:[16,20], unit:'㎡', calc:'sqm'},
  {key:'입주청소+폐기물', icon:'🧹', s:[3,5],   m:[5,7],   p:[7,10],  unit:'평', calc:'pyeong'},
];

function fmt(m){
  m=Math.round(m);
  if(m>=10000){const u=Math.floor(m/10000),r=m%10000;return r>0?`${u}억 ${r.toLocaleString()}만`:`${u}억`;}
  return m.toLocaleString()+'만';
}
function fmtFull(m){
  m=Math.round(m);
  if(m>=10000){const u=Math.floor(m/10000),r=m%10000;return r>0?`${u}억 ${r.toLocaleString()}만원`:`${u}억원`;}
  return m.toLocaleString()+'만원';
}
function getBaths(p){return p<=25?1:p<=40?2:3;}
function getSink(p){return p<=25?2.4:p<=40?3.0:3.6;}

function calcItem(item, pyeong, coef){
  const sqm=Math.round(pyeong*3.305);
  const B=getBaths(pyeong);
  const SM=getSink(pyeong);
  let qty=1;
  if(item.calc==='pyeong') qty=pyeong;
  else if(item.calc==='sqm') qty=sqm;
  else if(item.calc==='bath') qty=B;
  else if(item.calc==='sink') qty=SM;
  else if(item.calc==='fixed') qty=1;
  else if(item.calc==='fixed1') qty=1;

  const sv=Math.round((item.s[0]+item.s[1])/2*coef*qty);
  const mv=Math.round((item.m[0]+item.m[1])/2*coef*qty);
  const pv=Math.round((item.p[0]+item.p[1])/2*coef*qty);
  return {sv,mv,pv,qty};
}

function getSubLabel(item, pyeong){
  const sqm=Math.round(pyeong*3.305);
  const B=getBaths(pyeong); const SM=getSink(pyeong);
  if(item.calc==='pyeong') return `${pyeong}평 기준`;
  if(item.calc==='sqm') return `${sqm}㎡ 기준`;
  if(item.calc==='bath') return `욕실 ${B}개소`;
  if(item.calc==='sink') return `${SM}m 기준`;
  return '';
}

// ── 파라미터 읽기 ───────────────────────────────────────────
const P=new URLSearchParams(window.location.search);
const region  = P.get('region')  || '수도권';
const pyeong  = parseInt(P.get('pyeong'))  || 40;
const budget  = parseInt(P.get('budget'))  || 10000;
const purpId  = P.get('purpose') || 'safe';
const hasBudget = P.has('budget') && parseInt(P.get('budget')) > 0;

const purpose = PURPOSES.find(p=>p.id===purpId) || PURPOSES[4];
const coef = (RC[region]||RC['기타']).coef;
const base = (RC[region]||RC['기타']).base;

// ── 전체 합산 계산 ──────────────────────────────────────────
let totalS=0, totalM=0, totalP=0;
ITEMS.forEach(item=>{
  const {sv,mv,pv}=calcItem(item,pyeong,coef);
  totalS+=sv; totalM+=mv; totalP+=pv;
});

function renderRow(item, isMust, isPri){
  const {sv,mv,pv}=calcItem(item,pyeong,coef);
  const sub=getSubLabel(item,pyeong);
  const badge = isPri
    ? `<span class="irow-badge pri">최우선</span>`
    : isMust ? `<span class="irow-badge rec">권장</span>` : '';
  const cls = isMust ? 'irow hl' : 'irow';
  return `<div class="${cls}">
    <div class="irow-name">
      <span class="irow-icon">${item.icon}</span>
      <div class="irow-info">
        <div class="irow-tt">${item.key}${badge}</div>
        ${sub?`<div class="irow-sub">${sub}</div>`:''}
      </div>
    </div>
    <div class="irow-cell sv">${fmt(sv)}</div>
    <div class="irow-cell mv">${fmt(mv)}</div>
    <div class="irow-cell pv">${fmt(pv)}</div>
  </div>`;
}

function render(){
  // 히어로
  document.getElementById('rhTt').innerHTML =
    `<span class="hl">${region}</span> · <span class="hl">${pyeong}평</span> · ${purpose.emoji} ${purpose.name}`;
  document.getElementById('rhChips').innerHTML = `
    <div class="rh-chip">욕실 ${getBaths(pyeong)}개</div>
    <div class="rh-chip">싱크대 ${getSink(pyeong)}m</div>
    <div class="rh-chip">전용 ${Math.round(pyeong*3.305)}㎡</div>
    ${hasBudget?`<div class="rh-chip" style="background:rgba(127,168,255,.25);border-color:rgba(127,168,255,.4);">내 예산 ${fmtFull(budget)}</div>`:''}
  `;

  // 전체 수준 숫자
  document.getElementById('lp-s').textContent = fmtFull(totalS);
  document.getElementById('lu-s').textContent = `${Math.round(totalS/pyeong)}만원/평`;
  document.getElementById('lp-m').textContent = fmtFull(totalM);
  document.getElementById('lu-m').textContent = `${Math.round(totalM/pyeong)}만원/평`;
  document.getElementById('lp-p').textContent = fmtFull(totalP);
  document.getElementById('lu-p').textContent = `${Math.round(totalP/pyeong)}만원/평`;

  // 내 예산 게이지
  if(hasBudget){
    const row=document.getElementById('myBudgetRow');
    row.classList.add('show');
    const pct=Math.min(100,Math.max(0,Math.round((budget-totalS)/(totalP-totalS)*100)));
    setTimeout(()=>{
      document.getElementById('gaugeFill').style.width=pct+'%';
      document.getElementById('gaugeDot').style.left=pct+'%';
    },300);
    let noteText='';
    if(budget<totalS) noteText=`내 예산 ${fmtFull(budget)} — 절약형보다 낮아요`;
    else if(budget<totalM) noteText=`내 예산 ${fmtFull(budget)} — 절약형~적정 사이`;
    else if(budget<=totalP) noteText=`내 예산 ${fmtFull(budget)} — 적정 수준에 해당해요`;
    else noteText=`내 예산 ${fmtFull(budget)} — 프리미엄 시공이 가능해요`;
    document.getElementById('myBudgetNote').textContent=noteText;
  }

  // 필수 공종
  document.getElementById('secMust').textContent=`${purpose.emoji} ${purpose.name} 필수 공종`;
  const mustItems=purpose.must.map(k=>ITEMS.find(i=>i.key===k)).filter(Boolean)
    .sort((a,b)=>(purpose.pri.includes(b.key)?1:0)-(purpose.pri.includes(a.key)?1:0));
  document.getElementById('mustRows').innerHTML=mustItems.map(item=>
    renderRow(item,true,purpose.pri.includes(item.key))
  ).join('');

  // 기타 공종
  const restItems=ITEMS.filter(i=>!purpose.must.includes(i.key));
  document.getElementById('restRows').innerHTML=restItems.map(item=>
    renderRow(item,false,false)
  ).join('');

  // 전문가 조언
  const tips=TIPS[purpId]||[];
  const tipListHtml=tips.map(t=>`
    <div class="tip-item">
      <div class="tip-ic">${t.icon}</div>
      <div>
        <div class="tip-tt2">${t.tt}</div>
        <div class="tip-sb2">${t.sb}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('tipArea').innerHTML=`
    <div class="tip-box">
      <div class="tip-box-hd">
        <span class="tip-badge">${purpose.emoji} ${purpose.name}</span>
        <span class="tip-box-tt">공사 전 꼭 알아야 할 것</span>
      </div>
      <div class="tip-list">${tipListHtml}</div>
    </div>
  `;
}

render();
</script>
</body>
</html>
